<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Единый портал интерактивных государственных услуг</title>

<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/site.min.css" rel="stylesheet">
<link href="css/site.css" rel="stylesheet">

</head>

<body>

<div class="wrap another_wrap">

<nav class="navbar-inverse navbar-fixed-top navbar">
<div class="navbar-header">
<a class="navbar-brand">
<img src="img/new/logotype.svg">
</a>
</div>
</nav>

<div class="container">
<div class="container_in">

<div class="row dflex_repo_row">

<div class="col-md-6 vcenter vcenter_first">

<h3 class="repo_qr_info">
Введите PIN-код для просмотра документа
</h3>

<div class="pinForm col-md-6">

<div class="form-group">

<label class="control-label">PIN код</label>

<input 
type="text"
id="pinInput"
class="form-control"
placeholder="Введите PIN">

</div>

<button onclick="checkPIN()" class="btn btn-primary pull-center">
Открыть
</button>

</div>

<h3 class="repo_qr_info qr_blue">
PIN-код размещается рядом с QR-кодом документа
</h3>

</div>

<div class="col-md-6 vcenter">

<img src="img/pin_code_document.jpg"
style="margin:0 auto;display:block;">

</div>

</div>

</div>
</div>

</div>

<script>

/* ВОТ ТУТ ТЫ МЕНЯЕШЬ */

const PIN_CODE = "6962";
const PDF_FILE = "olmdu.mygov.uz.pdf";

function checkPIN(){

let input = document.getElementById("pinInput").value;

if(input === PIN_CODE){

window.location.href = PDF_FILE;

}else{

alert("Неверный PIN код");

}

}

</script>

</body>
</html>
